name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mm_forum_test
          POSTGRES_USER: mm
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      DATABASE_URL: postgresql://mm:test@localhost:5432/mm_forum_test
      QDRANT_URL: http://localhost:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:6333/healthz && break
            sleep 2
          done

      - name: Run tests
        run: pytest tests/ -v --cov=mm_forum --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://mm:test@localhost:5432/mm_forum_test
          QDRANT_URL: http://localhost:6333

  # TODO: add build-and-deploy job when moving to AWS
