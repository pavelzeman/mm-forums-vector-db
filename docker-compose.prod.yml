services:
  postgres:
    restart: unless-stopped
    ports: []  # don't expose postgres publicly in prod

  qdrant:
    restart: unless-stopped
    ports: []  # served via nginx in prod

  streamlit:
    build: .
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.headless=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD}@postgres:5432/mm_forum
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - streamlit

volumes:
  letsencrypt:
