services:
  postgres:
    restart: unless-stopped

  qdrant:
    restart: unless-stopped

  streamlit:
    build: .
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.headless=true
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mm:${POSTGRES_PASSWORD}@postgres:5432/mm_forum
      QDRANT_URL: http://qdrant:6333
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx:alpine processes files in /etc/nginx/templates/ with envsubst automatically
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      # Certs provisioned on the host by certbot before this stack starts
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - streamlit
